name: keep-alive

# Free-tier Render sleeps after ~15 min idle and a cold boot takes 30-60s, which is long
# enough that a player meets the readiness gate ("CAN'T REACH THE SERVER") instead of
# their mission.
#
# This used to be a SINGLE curl per trigger, which made it entirely dependent on GitHub's
# scheduler being punctual. It is not. Measured over a real day, a `*/10` schedule
# actually fired with gaps of 51, 60, 61, 64, 99, 196 and 224 minutes — up to 22x the
# requested interval — so the API was routinely asleep despite a "10 minute" keep-alive.
# That is what produced three cold-start screens inside four minutes of play.
#
# The fix is to stop trusting the scheduler for CADENCE and trust it only for STARTING.
# Each run now holds the server awake for ~50 minutes on its own precise 5-minute loop,
# so a late trigger costs coverage rather than correctness, and an hours-long cron gap is
# covered by a run that is still going. A public repo has unlimited Actions minutes, so
# this is free.
#
# This is still a workaround. The real fixes, in order of robustness:
#   1. A host that does not sleep (Render Starter is ~$7/mo and removes this entirely).
#   2. An external pinger (UptimeRobot / cron-job.org, 5-min, free) which does not depend
#      on GitHub's scheduler at all.
# Keep this as the free backstop either way. The in-app readiness gate remains the thing
# that guarantees a run is never silently lost.

on:
  schedule:
    - cron: '*/15 * * * *' # a START signal, not the real cadence (see above)
  workflow_dispatch: {}     # manual "wake it now"

# One chain at a time. A trigger arriving mid-loop is queued rather than stacked, and
# GitHub keeps only the newest pending run per group, so this can never pile up.
concurrency:
  group: keep-alive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    # Bounded well under the 6h job limit; the loop exits on its own long before this.
    timeout-minutes: 55
    steps:
      - name: Hold the API awake
        env:
          API_URL: ${{ secrets.API_URL }}
        run: |
          set -u
          URL="${API_URL:-https://valor-qqzx.onrender.com}"
          # 10 pings, 5 minutes apart = ~50 minutes of coverage from one trigger.
          for i in $(seq 1 10); do
            code=$(curl -fsS --max-time 90 -o /dev/null -w "%{http_code}" "$URL/health" || echo "000")
            echo "$(date -u +%H:%M:%S) ping $i/10 -> HTTP $code"
            if [ "$i" -lt 10 ]; then sleep 300; fi
          done
          # Never fail the job: a cold-boot 502 is expected, and a red X here would just
          # train us to ignore this workflow's notifications.
          exit 0
